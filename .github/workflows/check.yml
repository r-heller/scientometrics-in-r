name: R CMD Check

on:
  push:
    branches: [main]
    paths:
      - "R/**"
      - "man/**"
      - "tests/**"
      - "DESCRIPTION"
      - "NAMESPACE"
  pull_request:
    branches: [main]
    paths:
      - "R/**"
      - "man/**"
      - "tests/**"
      - "DESCRIPTION"
      - "NAMESPACE"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev

      - name: Install dependencies
        run: |
          install.packages(c("rcmdcheck", "remotes", "pkgdown"))
          remotes::install_deps(dependencies = TRUE)
        shell: Rscript {0}

      - name: R CMD check
        run: |
          rcmdcheck::rcmdcheck(args = c("--no-manual", "--as-cran"), error_on = "error")
        shell: Rscript {0}

      - name: Build pkgdown site
        run: |
          pkgdown::build_site(override = list(destination = "../_book/pkg"))
        shell: Rscript {0}

      - name: Deploy pkgdown to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_book/pkg
          destination_dir: pkg
