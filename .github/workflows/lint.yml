name: Lint

on:
  push:
    branches: [main]
    paths:
      - "R/**"
      - "scripts/**"
  pull_request:
    branches: [main]
    paths:
      - "R/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("lintr", "styler"))
        shell: Rscript {0}

      - name: Run lintr
        run: |
          library(lintr)
          lints <- lint_dir("R")
          if (length(lints) > 0) {
            print(lints)
            stop("lintr found issues.")
          }
          cat("lintr: all clear\n")
        shell: Rscript {0}

      - name: Run styler check
        run: |
          library(styler)
          out <- style_dir("R", dry = "fail")
        shell: Rscript {0}
