name: Verify citations
on: [push, pull_request]

jobs:
  citations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Disable renv autoloader in CI
        # Same reason as the render workflow: with the project .Rprofile
        # in place, renv re-activates an empty project library between
        # steps and install.packages can't find a usable repo.
        run: rm -f .Rprofile
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Install dependencies
        # use-public-rspm sets up the Posit mirror via Rprofile.site, but
        # be explicit for safety on platforms where the site-profile is
        # not yet loaded when this Rscript starts.
        run: |
          install.packages(
            "stringr",
            repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest"
          )
        shell: Rscript {0}
      - name: Verify citations
        run: Rscript scripts/verify-citations.R
