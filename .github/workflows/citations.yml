name: Verify Citations

on:
  push:
    branches: [main]
    paths:
      - "references.bib"
      - "chapters/**"
      - "case-studies/**"
      - "appendices/**"
  pull_request:
    branches: [main]
    paths:
      - "references.bib"
      - "chapters/**"
      - "case-studies/**"
      - "appendices/**"
  workflow_dispatch:

jobs:
  citations:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages(c("bib2df", "rcrossref", "stringr"))
        shell: Rscript {0}

      - name: Verify citations
        run: |
          source("scripts/verify_citations.R")
        shell: Rscript {0}
