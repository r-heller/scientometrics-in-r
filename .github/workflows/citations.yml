name: Verify Citations

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Install dependencies
        run: |
          install.packages("stringr")
        shell: Rscript {0}

      - name: Verify citations
        run: |
          source("scripts/verify_citations.R")
        shell: Rscript {0}
