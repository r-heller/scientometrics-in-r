name: Render and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: write

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Disable renv autoloader in CI
        run: rm -f .Rprofile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libpoppler-cpp-dev libtesseract-dev libleptonica-dev \
            libudunits2-dev libgdal-dev libmagick++-dev default-jdk \
            libglpk-dev libnode-dev libv8-dev cmake

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: /home/runner/work/_temp/Library
          key: rlib-Linux-r4.4.1-renvlock-${{ hashFiles('renv.lock') }}
          restore-keys: |
            rlib-Linux-r4.4.1-renvlock-

      - name: Install lockfile package names via install.packages
        # pak's dependency solver rejects the lockfile (version conflicts
        # against RSPM heads). Use plain install.packages, which is
        # permissive: it'll pull the current RSPM-compatible version of
        # every name in renv.lock, plus deps. We give up strict version
        # pinning vs. renv.lock — acceptable in CI for a docs site.
        run: |
          options(
            install.packages.check.source = "no",
            repos = c(CRAN = "https://packagemanager.posit.co/cran/__linux__/noble/latest"),
            Ncpus = parallel::detectCores()
          )
          install.packages("jsonlite")
          lock <- jsonlite::fromJSON("renv.lock", simplifyVector = FALSE)
          pkgs <- names(lock$Packages)
          # Drop base + recommended (already on .libPaths(), can't reinstall
          # over them anyway).
          base_rec <- rownames(installed.packages(
            lib.loc = .Library, priority = c("base", "recommended")
          ))
          # Packages used by chapters but not pinned in renv.lock —
          # quanteda extras, OCR / PDF / SQL / NLP utilities the lockfile
          # missed. Discovered by grep-ing library() calls in chapters/.
          extras <- c(
            "quanteda.textstats", "quanteda.textplots",
            "stopwords", "wordcloud", "textstem", "textrecipes",
            "RPostgres", "tabulapdf", "udpipe", "word2vec",
            "networkD3", "gender"
          )
          pkgs <- setdiff(unique(c(pkgs, extras)), c("renv", base_rec))
          cat("Installing", length(pkgs), "packages\n")
          install.packages(pkgs, dependencies = TRUE, lib = .libPaths()[1])
          cat("--- .libPaths() ---\n"); print(.libPaths())
          cat("--- bookdown ---\n")
          print(find.package("bookdown", quiet = TRUE))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python venv
        run: |
          python -m venv /opt/scientometrics-py
          /opt/scientometrics-py/bin/pip install --upgrade pip
          /opt/scientometrics-py/bin/pip install \
            sentence-transformers bertopic umap-learn hdbscan
          echo "RETICULATE_PYTHON=/opt/scientometrics-py/bin/python" >> $GITHUB_ENV

      - name: Render book (HTML + PDF + EPUB)
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "all")'

      - name: Render per-chapter PDFs
        run: Rscript scripts/render-chapter-pdfs.R

      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
