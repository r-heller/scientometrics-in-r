name: Render and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: write

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Disable renv autoloader in CI
        run: rm -f .Rprofile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libpoppler-cpp-dev libtesseract-dev libleptonica-dev \
            libudunits2-dev libgdal-dev libmagick++-dev default-jdk

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: /home/runner/work/_temp/Library
          key: rlib-Linux-r4.4.1-renvlock-${{ hashFiles('renv.lock') }}
          restore-keys: |
            rlib-Linux-r4.4.1-renvlock-

      - name: Install lockfile packages via pak into user lib
        # pak::lockfile_install expects pak's own lockfile schema, not
        # renv.lock — they're not compatible. Parse renv.lock for the
        # package name list, then pak::pkg_install into the user lib.
        # We lose strict version pinning vs. the lockfile, but every
        # package in the lockfile is on RSPM at a compatible version.
        run: |
          options(install.packages.check.source = "no")
          install.packages(
            c("jsonlite", "pak"),
            repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest"
          )
          lock <- jsonlite::fromJSON("renv.lock", simplifyVector = FALSE)
          pkgs <- names(lock$Packages)
          # Drop renv itself (already loaded) and any base/recommended pkgs.
          pkgs <- setdiff(pkgs, c("renv", rownames(installed.packages(priority = "high"))))
          cat("Installing", length(pkgs), "packages from renv.lock\n")
          pak::pkg_install(pkgs, lib = .libPaths()[1], ask = FALSE)
          cat("--- .libPaths() ---\n"); print(.libPaths())
          cat("--- bookdown ---\n")
          print(find.package("bookdown", quiet = TRUE))
        shell: Rscript {0}

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python venv
        run: |
          python -m venv /opt/scientometrics-py
          /opt/scientometrics-py/bin/pip install --upgrade pip
          /opt/scientometrics-py/bin/pip install \
            sentence-transformers bertopic umap-learn hdbscan
          echo "RETICULATE_PYTHON=/opt/scientometrics-py/bin/python" >> $GITHUB_ENV

      - name: Render book (HTML + PDF + EPUB)
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "all")'

      - name: Render per-chapter PDFs
        run: Rscript scripts/render-chapter-pdfs.R

      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
