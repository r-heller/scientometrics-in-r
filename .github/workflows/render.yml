name: Render and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: write

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable renv autoload — we manage the library ourselves in CI so that
  # the user-lib install path is honoured across steps. With autoload on,
  # renv/activate.R overrides .libPaths() to the empty renv project lib
  # and breaks every subsequent step.
  RENV_CONFIG_AUTOLOADER_ENABLED: "FALSE"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_CONFIG_AUTOLOADER_ENABLED: "FALSE"

    steps:
      - uses: actions/checkout@v4

      - name: Disable renv in CI
        # The project .Rprofile sources renv/activate.R, which keeps
        # re-activating an empty project library across steps. We install
        # packages into R_LIBS_USER and let R use that. Remove the
        # auto-loader so every Rscript step starts cleanly.
        run: rm -f .Rprofile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libpoppler-cpp-dev libtesseract-dev libleptonica-dev \
            libudunits2-dev libgdal-dev libmagick++-dev default-jdk

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Cache R library
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER || '/home/runner/work/_temp/Library' }}
          key: rlib-${{ runner.os }}-r4.4.1-${{ hashFiles('renv.lock') }}
          restore-keys: |
            rlib-${{ runner.os }}-r4.4.1-

      - name: Install renv and restore lockfile to user lib
        run: |
          options(renv.config.autoloader.enabled = FALSE)
          if (!requireNamespace("renv", quietly = TRUE)) {
            install.packages(
              "renv",
              repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest"
            )
          }
          # Install into the first .libPaths() (user lib), not the renv
          # project library, so subsequent steps see the packages.
          renv::restore(library = .libPaths()[1], prompt = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python venv
        run: |
          python -m venv /opt/scientometrics-py
          /opt/scientometrics-py/bin/pip install --upgrade pip
          /opt/scientometrics-py/bin/pip install \
            sentence-transformers bertopic umap-learn hdbscan
          echo "RETICULATE_PYTHON=/opt/scientometrics-py/bin/python" >> $GITHUB_ENV

      - name: Render book (HTML + PDF + EPUB)
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "all")'

      - name: Render per-chapter PDFs
        run: Rscript scripts/render-chapter-pdfs.R

      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
