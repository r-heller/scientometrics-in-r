name: Render and Deploy Book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libpoppler-cpp-dev libtesseract-dev libleptonica-dev \
            libudunits2-dev libgdal-dev libmagick++-dev default-jdk

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python venv
        run: |
          python -m venv /opt/scientometrics-py
          /opt/scientometrics-py/bin/pip install --upgrade pip
          /opt/scientometrics-py/bin/pip install \
            sentence-transformers bertopic umap-learn hdbscan
          echo "RETICULATE_PYTHON=/opt/scientometrics-py/bin/python" >> $GITHUB_ENV

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        run: quarto render

      - name: Upload PDF and EPUB artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: book-outputs
          path: |
            _book/*.pdf
            _book/*.epub
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_book

  deploy:
    needs: render
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
