name: Render and deploy book

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0"

permissions:
  contents: write

concurrency:
  group: render-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Disable renv autoloader in CI
        # The project .Rprofile sources renv/activate.R, which keeps
        # re-activating an empty project library across steps and hides
        # whatever setup-r-dependencies installs into R_LIBS_USER.
        # Removing the file makes every Rscript step use the standard
        # user-lib search path.
        run: rm -f .Rprofile

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev libgit2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libpoppler-cpp-dev libtesseract-dev libleptonica-dev \
            libudunits2-dev libgdal-dev libmagick++-dev default-jdk

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - name: Setup R dependencies via pak (lockfile + book deps)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 2
          # Force-install bookdown and the rest of the render-time deps
          # explicitly, in case DESCRIPTION-detection misses any.
          extra-packages: |
            any::bookdown
            any::rmarkdown
            any::knitr
            any::downlit
            any::xml2
            any::sessioninfo
            any::tinytex

      - uses: r-lib/actions/setup-tinytex@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python venv
        run: |
          python -m venv /opt/scientometrics-py
          /opt/scientometrics-py/bin/pip install --upgrade pip
          /opt/scientometrics-py/bin/pip install \
            sentence-transformers bertopic umap-learn hdbscan
          echo "RETICULATE_PYTHON=/opt/scientometrics-py/bin/python" >> $GITHUB_ENV

      - name: Render book (HTML + PDF + EPUB)
        run: Rscript -e 'bookdown::render_book("index.Rmd", output_format = "all")'

      - name: Render per-chapter PDFs
        run: Rscript scripts/render-chapter-pdfs.R

      - name: Deploy to gh-pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
