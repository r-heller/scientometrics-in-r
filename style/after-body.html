<!-- Dark/light mode toggle -->
<div class="sticky-item">
  <button type="button" id="mode-switch" class="btn-circle-mode" aria-label="Toggle dark mode">
    <i class="fa-solid fa-circle-half-stroke" aria-hidden="true"></i>
  </button>
</div>

<script>
  (function () {
    var stored = localStorage.getItem('themeMode');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var initial = stored || (prefersDark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', initial);

    document.addEventListener('DOMContentLoaded', function () {
      var btn = document.getElementById('mode-switch');
      if (!btn) return;
      btn.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('themeMode', next);
      });
    });
  })();
</script>

<!--
  Right-side panel "Download" section: adds
    - Download
      - Entire book (PDF)
      - This chapter (PDF)
  above the existing "View source" / "Edit this page" links produced by
  bs4_book's repo:base config. The chapter PDF URL is derived from the
  View-source href so it stays in sync with however bookdown slugs the
  page filename.
-->
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var extraList = document.querySelector(".book-extra ul.list-unstyled");
    if (!extraList) return;

    var bookName = "scientometrics-in-r";
    var bookPdf  = bookName + ".pdf";

    // Derive the chapter PDF from the source path:
    //   chapters/01-foo.Rmd  -> pdf-chapters/01-foo.pdf
    var src = document.getElementById("book-source");
    var chapterPdf = null;
    if (src && src.href) {
      var match = src.href.match(/blob\/[^/]+\/(.+\.Rmd)$/);
      if (match) {
        var rmd = match[1];                              // e.g. chapters/01-foo.Rmd
        var baseName = rmd.split("/").pop().replace(/\.Rmd$/, ".pdf");
        chapterPdf = "pdf-chapters/" + baseName;
      }
    }

    // Header above the download entries
    var header = document.createElement("li");
    header.className = "book-extra-section";
    var hb = document.createElement("strong");
    hb.textContent = "Download";
    header.appendChild(hb);

    var bookItem = document.createElement("li");
    var bookA    = document.createElement("a");
    bookA.id         = "book-pdf-full";
    bookA.href       = bookPdf;
    bookA.textContent = "Entire book (PDF) ";
    var bookI    = document.createElement("i");
    bookI.className = "fa-solid fa-file-pdf";
    bookA.appendChild(bookI);
    bookItem.appendChild(bookA);

    var firstChild = extraList.firstElementChild;
    extraList.insertBefore(header,   firstChild);
    extraList.insertBefore(bookItem, firstChild);

    if (chapterPdf) {
      var chapItem = document.createElement("li");
      var chapA    = document.createElement("a");
      chapA.id         = "book-pdf-chapter";
      chapA.href       = chapterPdf;
      chapA.textContent = "This chapter (PDF) ";
      var chapI    = document.createElement("i");
      chapI.className = "fa-solid fa-file-pdf";
      chapA.appendChild(chapI);
      chapItem.appendChild(chapA);
      extraList.insertBefore(chapItem, firstChild);
    }
  });
</script>
