project:
  type: book
  output-dir: _book

book:
  title: "Scientometrics in R"
  subtitle: "Bibliometrics, Network Science, and Research Evaluation"
  author:
    - name: "Raban Heller"
      orcid: "0000-0001-8006-9742"
  date: today
  cover-image: "images/cover.png"
  favicon: "images/cover.png"
  repo-url: https://github.com/r-heller/scientometrics-in-r
  repo-branch: main
  repo-actions: [edit, source, issue]
  search: true
  sharing: [twitter, linkedin]
  downloads: [pdf, epub]
  sidebar:
    style: docked

  chapters:
    - index.qmd
    - chapters/00-find-your-method.qmd

    - part: "Part I — Foundations"
      chapters:
        - chapters/01-what-is-scientometrics.qmd
        - chapters/02-theoretical-underpinnings.qmd
        - chapters/03-ethics-responsible-metrics.qmd
        - chapters/04-data-sources-compared.qmd

    - part: "Part II — Data Acquisition in R"
      chapters:
        - chapters/05-apis-and-packages.qmd
        - chapters/06-parsing-native-exports.qmd
        - chapters/07-building-reproducible-corpora.qmd
        - chapters/08-working-with-full-text.qmd

    - part: "Part III — Core Bibliometric Analysis"
      chapters:
        - chapters/09-descriptive-bibliometrics.qmd
        - chapters/10-productivity-impact-indicators.qmd
        - chapters/11-journal-metrics.qmd
        - chapters/12-author-level-analysis.qmd
        - chapters/13-institutional-country-analysis.qmd
        - chapters/14-temporal-analysis-citation-aging.qmd

    - part: "Part IV — Network & Mapping Methods"
      chapters:
        - chapters/15-co-authorship-networks.qmd
        - chapters/16-co-citation-bibliographic-coupling.qmd
        - chapters/17-co-word-keyword-cooccurrence.qmd
        - chapters/18-community-detection-backbone.qmd
        - chapters/19-science-mapping-overlay.qmd
        - chapters/20-visualization-interop.qmd

    - part: "Part V — Text & Topic Analysis"
      chapters:
        - chapters/21-text-mining-corpora.qmd
        - chapters/22-topic-modeling.qmd
        - chapters/23-keyword-extraction.qmd
        - chapters/24-embeddings-scientometrics.qmd
        - chapters/25-detecting-emerging-topics.qmd

    - part: "Part VI — Advanced Topics"
      chapters:
        - chapters/26-altmetrics.qmd
        - chapters/27-open-science-indicators.qmd
        - chapters/28-gender-equity-analysis.qmd
        - chapters/29-retraction-analysis.qmd
        - chapters/30-funding-analysis.qmd
        - chapters/31-patent-paper-linkages.qmd
        - chapters/32-causal-inference-scientometrics.qmd
        - chapters/33-reproducibility-rrids-badges.qmd

    - part: "Part VII — Production & Reporting"
      chapters:
        - chapters/34-reproducible-pipelines.qmd
        - chapters/35-interactive-dashboards.qmd
        - chapters/36-parameterized-reports.qmd
        - chapters/37-bibliometric-shiny-app.qmd

    - part: "Part VIII — Case Studies"
      chapters:
        - case-studies/cs01-crispr-field-review.qmd
        - case-studies/cs02-institutional-benchmark.qmd
        - case-studies/cs03-journal-portfolio.qmd
        - case-studies/cs04-gender-gap.qmd
        - case-studies/cs05-emerging-topics.qmd

  appendices:
    - appendices/A-r-setup.qmd
    - appendices/B-openalex-sql.qmd
    - appendices/C-glossary.qmd
    - appendices/D-indicator-crosswalk.qmd
    - appendices/E-cheatsheets.qmd
    - appendices/E-solutions.qmd

bibliography: references.bib
csl: styles/chicago-author-date.csl

format:
  html:
    theme:
      - cosmo
      - styles/theme.scss
    code-link: true
    code-copy: true
    code-tools: true
    toc-depth: 3
  pdf:
    documentclass: scrbook
    papersize: a4
    geometry: "margin=2.5cm"
    include-in-header: styles/preamble.tex
    fig-pos: "H"
  epub:
    cover-image: images/cover.png

execute:
  freeze: auto
  cache: true
  warning: false
  message: false
